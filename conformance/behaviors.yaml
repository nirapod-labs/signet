# Cross-language behaviors asserted identically across Dart, TypeScript, Kotlin,
# and Swift. Each carries an expected disposition: a `pending` behavior must
# report "unimplemented" on every available runner (no silent skip, no early
# pass), while a `verified` behavior must pass on every runner. Items flip from
# pending to verified as the cores and bindings land.
version: 1
behaviors:
  - id: tier.readBackNotRequest
    status: pending
    assert: getSecurityTier reports the achieved tier, never an assumed or requested one.
  - id: tier.policyFloorFails
    status: pending
    assert: tierPolicy strongest fails unavailableTier when no secure hardware is available; atLeast(class) fails unavailableTier when the requested floor is not met by available hardware; a below-floor key is deleted, never returned.
  - id: tier.returnedKeySatisfiesFloor
    status: pending
    assert: a returned SecurityTierReport always satisfies the requested tierPolicy floor; a key that would fall below the floor is deleted and the call fails unavailableTier.
  - id: tier.invalidatedKeyNoThrow
    status: pending
    assert: getSecurityTier does not throw on an invalidated-but-not-deleted key; it returns a report the caller can inspect.
  - id: provenance.appleNeverAttested
    status: pending
    assert: Apple SE reports evidence=seTokenPresent and performs no tier attestation.
  - id: key.noPrivateExport
    status: pending
    assert: no surface, generated or hand-written, exposes a private-key export path.
  - id: key.existingAliasFails
    status: pending
    assert: generateKey on an existing alias fails with keyAlreadyExists.
  - id: attestation.generationBoundChallenge
    status: pending
    assert: getAttestation reflects the generation-time challenge; there is no call-time challenge.
  - id: attestation.noneHasEmptyChain
    status: pending
    assert: getAttestation returns format=none with an empty chain where the platform has no hardware key-attestation (Apple SE always).
  - id: attestation.invalidatedMayReturnNoneWhereUnprobeable
    status: pending
    assert: a platform with no non-prompting invalidation probe may return format=none on an invalidated key rather than raising keyInvalidated (Apple SE); this divergence is contract-allowed, not a conformance failure.
  - id: error.oneClosedSet
    status: pending
    assert: every binding raises exactly the names in errors.json (spelling userCanceled).
  - id: sign.encodingParity
    status: pending
    assert: SignOptions encoding and normalizeLowS behave identically across bindings.
  - id: sign.rejectsWrongLengthDigest
    status: pending
    assert: sign rejects a digest that is not exactly 32 bytes with invalidArgument, before any key access, on every binding.
  - id: auth.concurrentSignRejected
    status: pending
    assert: a second concurrent auth-gated sign is rejected with authInProgress rather than queued behind the first prompt.

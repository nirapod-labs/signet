name: flutter-example
on:
  push:
    branches: [main]
    paths:
      - "flutter/SignetApp/**"
      - "flutter/signet/**"
      - ".github/workflows/ci-flutter-example.yml"
  pull_request:
    paths:
      - "flutter/SignetApp/**"
      - "flutter/signet/**"
      - ".github/workflows/ci-flutter-example.yml"
permissions:
  contents: read
jobs:
  flutter-example:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Analyze the Flutter example app
        run: |
          cd flutter/SignetApp
          flutter pub get
          flutter analyze

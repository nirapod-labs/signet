name: flutter-lib
on:
  push:
    paths:
      - "flutter/signet/**"
      - "apple/**"
      - "android/**"
      - ".github/workflows/ci-flutter-lib.yml"
  pull_request:
    paths:
      - "flutter/signet/**"
      - "apple/**"
      - "android/**"
      - ".github/workflows/ci-flutter-lib.yml"
permissions:
  contents: read
jobs:
  flutter-lib:
    runs-on: ubuntu-latest
    steps:

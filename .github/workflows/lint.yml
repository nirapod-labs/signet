name: biome
on:
  push:
    paths:
      - "**/*.js"
      - "**/*.mjs"
      - "**/*.ts"
      - "**/*.tsx"
      - "**/*.json"
      - "biome.json"
      - ".github/workflows/lint.yml"
  pull_request:
    paths:
      - "**/*.js"
      - "**/*.mjs"
      - "**/*.ts"
      - "**/*.tsx"
      - "**/*.json"
      - "biome.json"
      - ".github/workflows/lint.yml"
permissions:
  contents: read
jobs:
  biome:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec biome ci .

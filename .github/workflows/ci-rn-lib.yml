name: rn-lib
on:
  push:
    branches: [main]
    paths:
      - "react-native/react-native-signet/**"
      - ".github/workflows/ci-rn-lib.yml"
  pull_request:
    paths:
      - "react-native/react-native-signet/**"
      - ".github/workflows/ci-rn-lib.yml"
permissions:
  contents: read
jobs:
  rn-lib:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter react-native-signet run typecheck

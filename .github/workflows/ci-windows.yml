name: ci-windows
on:
  push:
    paths: ["windows/**", ".github/workflows/ci-windows.yml"]
  pull_request:
    paths: ["windows/**"]
permissions:
  contents: read
jobs:
  windows-core:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure, build, and test SignetWindowsCore
        shell: bash
        run: |
          cmake -S windows -B windows/build
          cmake --build windows/build
          ctest --test-dir windows/build --output-on-failure

name: rn-example
on:
  push:
    paths:
      - "react-native/SignetApp/**"
      - ".github/workflows/ci-rn-example.yml"
  pull_request:
    paths:
      - "react-native/SignetApp/**"
      - ".github/workflows/ci-rn-example.yml"
permissions:
  contents: read
jobs:
  rn-example:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Typecheck the React Native example app
        run: |
          cd react-native/SignetApp
          pnpm install --no-frozen-lockfile --ignore-workspace
          pnpm exec tsc --noEmit

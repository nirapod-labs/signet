name: conformance
on:
  push:
    paths:
      - "conformance/**"
      - ".github/workflows/conformance.yml"
  pull_request:
    paths:
      - "conformance/**"
      - ".github/workflows/conformance.yml"
permissions:
  contents: read
jobs:
  conformance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Cross-language conformance suite
        # Red until the cores and bindings land: the harness reports every
        # behavior unimplemented across the runners it can reach.
        run: node conformance/harness/driver.mjs

name: signet
description: "Hardware-only P-256 signing keys held in dedicated secure hardware: the Apple Secure Enclave, or the Android StrongBox or TEE-backed Keystore."
version: 0.1.0-dev
homepage: https://github.com/nirapod-labs/signet
repository: https://github.com/nirapod-labs/signet

environment:
  sdk: ^3.12.2
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  pigeon: ^27.1.0

flutter:
  plugin:
    # Each platform's pluginClass forwards the generated SignetHostApi to the
    # native core: Android to ../../android, iOS and macOS to ../../apple. iOS and
    # macOS share one darwin/ source tree.
    platforms:
      android:
        package: org.nirapod.signet
        pluginClass: SignetPlugin
      ios:
        pluginClass: SignetPlugin
        sharedDarwinSource: true
      macos:
        pluginClass: SignetPlugin
        sharedDarwinSource: true

# Only the JavaScript surfaces are pnpm workspaces. The Swift (apple/), Kotlin
# (android/, kmp/), and Dart (flutter/) trees are built by their own ecosystem
# tools, driven from the Makefile.
packages:
  - "react-native/react-native-signet"
  - "conformance"
  - "examples/*"
  - "docs"
  # SignetApp is a self-contained Expo app with its own lockfile; kept out
  # of the core workspace so its native dependency tree does not enter the core lockfile.
  - "!react-native/SignetApp"
